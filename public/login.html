<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Ingresar</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Tech<span>Store</span></a>
    <ul class="navbar-links">
      <li><a href="index.html">Productos</a></li>
      <li><a href="categorias.html">Categorías</a></li>
    </ul>
    <a href="carrito.html" class="carrito-nav">
      🛒 Carrito
      <span id="carrito-badge"></span>
    </a>
  </nav>

  <main class="main-container">
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo">Tech<span>Store</span></div>
        <p class="auth-sub">Tu cuenta para comprar</p>

        <!-- Tabs -->
        <div class="auth-tabs">
          <button class="auth-tab activo" id="tab-login">Iniciar sesión</button>
          <button class="auth-tab" id="tab-registro">Registrarse</button>
        </div>

        <!-- Form Login -->
        <div class="auth-form" id="form-login">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" />
          </div>
          <p class="error-msg" id="error-login"></p>
          <button class="btn-comprar" id="btn-login">Ingresar</button>
        </div>

        <!-- Form Registro -->
        <div class="auth-form" id="form-registro" style="display:none;">
          <div class="form-group">
            <label for="reg-nombre">Nombre</label>
            <input type="text" id="reg-nombre" class="form-input" placeholder="Juan" />
          </div>
          <div class="form-group">
            <label for="reg-apellido">Apellido</label>
            <input type="text" id="reg-apellido" class="form-input" placeholder="Pérez" />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-input" placeholder="tu@email.com" />
          </div>
          <p class="error-msg" id="error-registro"></p>
          <button class="btn-comprar" id="btn-registro">Crear cuenta</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
  <script type="module" src="js/carrito.js"></script>
</body>
</html>
