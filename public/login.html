<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Ingresar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <a href="index.html" class="navbar-brand">Tech<span>Store</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-links">
        <li><a href="index.html">Productos</a></li>
        <li><a href="categorias.html">Categorías</a></li>
      </ul>
    </div>
    <a href="carrito.html" class="carrito-nav">
      🛒 Carrito
      <span id="carrito-badge"></span>
    </a>
  </nav>

  <main class="main-container">
    <div class="auth-wrap">
      <div class="auth-box">
        <div class="auth-logo">Tech<span>Store</span></div>
        <p class="auth-sub">Tu cuenta para comprar</p>

        <div class="auth-tabs">
          <button class="auth-tab activo" id="tab-login">Iniciar sesión</button>
          <button class="auth-tab" id="tab-registro">Registrarse</button>
        </div>

        <!-- Form Login -->
        <div class="auth-form" id="form-login">
          <div class="form-group">
            <label for="login-email" class="form-label">Email</label>
            <input type="email" id="login-email" class="form-input form-control" placeholder="tu@email.com" />
          </div>
          <div class="form-group">
            <label for="login-password" class="form-label">Contraseña</label>
            <input type="password" id="login-password" class="form-input form-control" placeholder="••••••••" />
          </div>
          <p class="error-msg" id="error-login"></p>
          <button class="btn-comprar btn btn-primary" id="btn-login">Ingresar</button>
        </div>

        <!-- Form Registro -->
        <div class="auth-form" id="form-registro" style="display:none;">
          <div class="form-group">
            <label for="reg-nombre" class="form-label">Nombre</label>
            <input type="text" id="reg-nombre" class="form-input form-control" placeholder="Juan" />
          </div>
          <div class="form-group">
            <label for="reg-apellido" class="form-label">Apellido</label>
            <input type="text" id="reg-apellido" class="form-input form-control" placeholder="Pérez" />
          </div>
          <div class="form-group">
            <label for="reg-email" class="form-label">Email</label>
            <input type="email" id="reg-email" class="form-input form-control" placeholder="tu@email.com" />
          </div>
          <div class="form-group">
            <label for="reg-password" class="form-label">Contraseña</label>
            <input type="password" id="reg-password" class="form-input form-control" placeholder="••••••••" />
          </div>
          <p class="error-msg" id="error-registro"></p>
          <button class="btn-comprar btn btn-primary" id="btn-registro">Crear cuenta</button>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
