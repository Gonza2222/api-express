<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <a href="index.html" class="navbar-brand">Tech<span>Store</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-links">
        <li><a href="index.html">Productos</a></li>
        <li><a href="categorias.html">Categorías</a></li>
        <li id="nav-admin-link"><a href="admin.html" class="activo">Admin</a></li>
      </ul>
    </div>
    <div class="navbar-right">
      <div id="nav-usuario"></div>
      <a href="carrito.html" class="carrito-nav">
        🛒 Carrito
        <span id="carrito-badge"></span>
      </a>
    </div>
  </nav>

  <main class="main-container">
    <div class="page-header d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h1>Panel de administración</h1>
        <p>Gestión de productos — crear, editar y eliminar</p>
      </div>
      <button class="btn btn-primary" id="btn-nuevo" data-bs-toggle="modal" data-bs-target="#modalProducto">
        + Nuevo producto
      </button>
    </div>

    <p class="error-msg" id="admin-error"></p>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Disponible</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-productos">
          <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Modal crear/editar producto -->
  <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="form-producto">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-titulo">Nuevo producto</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body d-flex flex-column gap-3">
            <input type="hidden" id="prod-id" />
            <div class="form-group">
              <label class="form-label" for="prod-nombre">Nombre</label>
              <input type="text" id="prod-nombre" class="form-input form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prod-desc">Descripción</label>
              <input type="text" id="prod-desc" class="form-input form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prod-categoria">Categoría</label>
              <input type="text" id="prod-categoria" class="form-input form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prod-precio">Precio</label>
              <input type="number" min="0" step="1" id="prod-precio" class="form-input form-control" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="prod-stock">Stock</label>
              <input type="number" min="0" step="1" id="prod-stock" class="form-input form-control" required />
            </div>
            <div class="form-check">
              <input type="checkbox" id="prod-disponible" class="form-check-input" checked />
              <label class="form-check-label" for="prod-disponible">Disponible</label>
            </div>
            <p class="error-msg" id="modal-error"></p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
