<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Carrito</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <a href="index.html" class="navbar-brand">Tech<span>Store</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-links">
        <li><a href="index.html">Productos</a></li>
        <li><a href="categorias.html">Categorías</a></li>
        <li id="nav-admin-link" style="display:none;"><a href="admin.html">Admin</a></li>
      </ul>
    </div>
    <div class="navbar-right">
      <div id="nav-usuario"></div>
      <a href="carrito.html" class="carrito-nav activo">
        🛒 Carrito
        <span id="carrito-badge"></span>
      </a>
    </div>
  </nav>

  <main class="main-container">
    <div class="page-header">
      <h1>Tu carrito</h1>
    </div>

    <button class="btn-vaciar btn btn-outline-light btn-sm" id="btn-vaciar" style="display:none;">
      🗑 Vaciar carrito
    </button>

    <div class="carrito-layout">
      <!-- Lista de ítems -->
      <div class="carrito-lista" id="carrito-lista"></div>

      <!-- Panel derecho -->
      <div class="panel-lateral">
        <div class="total-box">
          <h3>Total</h3>
          <div class="total-precio" id="carrito-total">$ 0</div>
        </div>

        <!-- Checkout (se renderiza dinámicamente según si hay sesión) -->
        <div id="checkout-section"></div>
      </div>
    </div>

    <!-- Confirmación post-compra -->
    <div class="confirmacion" id="confirmacion"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/carritoPage.js"></script>
</body>
</html>
